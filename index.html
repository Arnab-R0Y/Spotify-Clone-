<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify Clone</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"/>
</head>
<body>
    <nav>
        <ul>
            <li class="brand">
                <img src="Essentials/SpotifyLogo.png" alt="Spotify logo">
            </li>
            <li class="Navbar_element" id="Home">Home</li>
            <li class="Navbar_element" id="About">About</li>
            <li class="search">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="Search on Spotify">
            </li>
            <li class="Navbar_element" id="Contact">Contact Us</li>
            <li class="Navbar_element LoginSignup" id="Login">Login</li>
            <li class="Navbar_element LoginSignup" id="Signup">Sign Up</li>
        </ul>
    </nav>

    <div class="bottom">
        <div class="songPlaying">
            <img src="Essentials/Aikatan_logo.jpg" alt="Cover" id="songCover">
            <div class="songInfo">
                <span id="songName">Song Name</span>
                <span id="songArtist">Artist</span>
            </div>
        </div>

        <div class="progressBarSection">
            <div class="progressBarIcons">
                <i class="fa-solid fa-backward-step icon"></i>
                <i class="fa-solid fa-play icon"></i>
                <i class="fa-solid fa-forward-step icon"></i>
            </div>

            <input type="range" name="range" id="myProgressBar" min="0" max="100" value="0">
        </div>
        
        <div class="volume">
            <i class="fa-solid fa-volume-high"></i>
            <input type="range" id="volumeBar" min="0" max="100" value="50">
        </div>
    </div>
    
</body>
</html>
